<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تایپستان - آموزش تایپ ۱۰ انگشتی</title>

<style>
body{
  margin:0;
  font-family:tahoma;
  background:#0f172a;
  color:white;
  text-align:center;
}

header{
  padding:20px;
  background:#111827;
  color:#22c55e;
  font-size:28px;
  font-weight:bold;
}

.container{
  margin-top:30px;
  padding:20px;
}

.box{
  background:#1f2937;
  padding:20px;
  border-radius:10px;
  width:90%;
  max-width:600px;
  margin:auto;
}

input{
  width:100%;
  padding:12px;
  font-size:18px;
  margin-top:10px;
  border-radius:8px;
  border:none;
}

.stats{
  display:flex;
  justify-content:space-around;
  margin-top:15px;
}

.stat{
  background:#111827;
  padding:10px;
  border-radius:8px;
  width:30%;
}

button{
  margin-top:15px;
  padding:10px 20px;
  background:#22c55e;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
}
</style>

</head>

<body>

<header>تایپستان 🚀</header>

<div class="container">

  <div class="box">
    <h2>تمرین تایپ ۱۰ انگشتی</h2>

    <p id="text">سلام دنیا، این یک تمرین تایپ است</p>

    <input id="input" placeholder="اینجا تایپ کن..." oninput="checkTyping()">

    <div class="stats">
      <div class="stat">WPM: <span id="wpm">0</span></div>
      <div class="stat">درست: <span id="correct">0</span></div>
      <div class="stat">اشتباه: <span id="wrong">0</span></div>
    </div>

    <button onclick="reset()">ریست</button>
  </div>

</div>

<script>
let startTime = null;

function checkTyping(){
  let text = document.getElementById("text").innerText;
  let input = document.getElementById("input").value;

  if(!startTime){
    startTime = Date.now();
  }

  let correct = 0;
  let wrong = 0;

  for(let i=0;i<input.length;i++){
    if(input[i] === text[i]){
      correct++;
    } else {
      wrong++;
    }
  }

  document.getElementById("correct").innerText = correct;
  document.getElementById("wrong").innerText = wrong;

  let minutes = (Date.now() - startTime) / 60000;
  let wpm = minutes > 0 ? Math.floor((input.length/5)/minutes) : 0;

  document.getElementById("wpm").innerText = wpm;
}

function reset(){
  document.getElementById("input").value = "";
  document.getElementById("correct").innerText = 0;
  document.getElementById("wrong").innerText = 0;
  document.getElementById("wpm").innerText = 0;
  startTime = null;
}
</script>

</body>
</html>
